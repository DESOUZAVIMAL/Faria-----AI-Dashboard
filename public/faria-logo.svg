<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <!-- Stylized Faria brand icon -->
  <g transform="translate(10, 10)">
    <rect width="60" height="60" rx="16" fill="#391638" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2"/>
    <text x="30" y="34" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-style="italic" font-size="38" fill="url(#faria-logo-grad)" text-anchor="middle" dominant-baseline="middle">f</text>
  </g>
  <!-- Faria Text Wordmark -->
  <text x="85" y="47" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="26" fill="#FFFFFF" letter-spacing="-1">Faria</text>
  <text x="155" y="47" font-family="'Inter', -apple-system, sans-serif" font-weight="500" font-size="26" fill="#E837AC" letter-spacing="-0.5">Education Group</text>
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="faria-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F78843" />
      <stop offset="50%" stop-color="#E837AC" />
      <stop offset="100%" stop-color="#F7D35F" />
    </linearGradient>
  </defs>
</svg>
